name: TruthKeep CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest anyio asyncio hypothesis psutil
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e .

    - name: Code Linting with Ruff
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        ruff check . --output-format=github --select=E9,F63,F7,F82
        # Default ruff rules (warned but not failing the build)
        ruff check . --exit-zero

    - name: Syntax compilation check
      run: |
        python -m compileall -q aegis_py/

    - name: Run Test Suite (Pytest)
      run: |
        python -m pytest tests/ --tb=short

    - name: Run Prove It Smoke Proof
      run: |
        python scripts/prove_it.py

    - name: Run Ablation Study Smoke Benchmark
      run: |
        python benchmarks/benchmark_ablation_math.py --smoke --seed 42 --cases 10
